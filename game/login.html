<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ログイン | Remushin Watch</title>
  <link rel="stylesheet" href="game.css" />
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <div class="brand">Remushin Watch</div>
    <nav class="main-nav">
      <a href="index.html">トップ</a>
      <a href="#">ダッシュボード</a>
      <a href="#">管理</a>
    </nav>
  </div>
</header>

<main>
  <section class="hero">
    <div class="container">
      <div class="hero-box">
        <p class="hero-label">LOGIN</p>
        <h1>ログイン画面</h1>
        <p class="hero-text">
          Discordでログインしてマッチングに参加できます。
        </p>

        <div class="hero-actions">
          <button id="discordLoginBtn" class="btn btn-primary" type="button">Discordでログイン</button>
          <a href="index.html" class="btn btn-secondary">戻る</a>
        </div>
      </div>
    </div>
  </section>
</main>

<script>
  const API_BASE =
    location.hostname === "localhost"
      ? "http://localhost:3000"
      : "https://discord-server-app.onrender.com";

  const discordLoginBtn = document.querySelector("#discordLoginBtn");

  if (discordLoginBtn) {
    discordLoginBtn.addEventListener("click", () => {
      window.location.href = `${API_BASE}/auth/discord`;
    });
  }
</script>

</body>
</html>
